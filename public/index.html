<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi Terminal</title>
  <link rel="stylesheet" href="/libs/xterm/css/xterm.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    #header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    #header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #58a6ff;
    }

    #status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
    }

    .status-dot.disconnected {
      background: #f85149;
    }

    #terminal-count {
      background: #21262d;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      color: #8b949e;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 10px;
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: #238636;
      color: #fff;
    }

    .btn-primary:hover {
      background: #2ea043;
    }

    .btn-secondary {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
    }

    .btn-secondary:hover {
      background: #30363d;
      border-color: #8b949e;
    }

    .btn-danger {
      background: #da3633;
      color: #fff;
    }

    .btn-danger:hover {
      background: #f85149;
    }

    .btn-small {
      padding: 4px 8px;
      font-size: 11px;
    }

    /* Tabs */
    #tabs {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      padding: 0 10px;
      overflow-x: auto;
      min-height: 42px;
    }

    .tab {
      padding: 10px 16px;
      font-size: 13px;
      color: #8b949e;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .tab:hover {
      color: #c9d1d9;
      background: #21262d;
    }

    .tab.active {
      color: #c9d1d9;
      border-bottom-color: #58a6ff;
      background: #21262d;
    }

    .tab .close-btn {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .tab:hover .close-btn {
      opacity: 1;
    }

    .tab .close-btn:hover {
      background: #da3633;
      color: #fff;
    }

    /* Terminal Container */
    #terminals {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
      overflow: hidden;
    }

    .terminal-wrapper {
      flex: 1;
      display: none;
      background: #0d1117;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #30363d;
    }

    .terminal-wrapper.active {
      display: flex;
      flex-direction: column;
    }

    .terminal-content {
      flex: 1;
      padding: 8px;
      overflow: hidden;
    }

    /* 自定义滚动条样式（暗色主题） */
    .terminal-content .xterm-viewport::-webkit-scrollbar {
      width: 10px;
    }

    .terminal-content .xterm-viewport::-webkit-scrollbar-track {
      background: #161b22;
      border-radius: 5px;
    }

    .terminal-content .xterm-viewport::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 5px;
    }

    .terminal-content .xterm-viewport::-webkit-scrollbar-thumb:hover {
      background: #484f58;
    }

    /* Firefox 滚动条样式 */
    .terminal-content .xterm-viewport {
      scrollbar-width: thin;
      scrollbar-color: #30363d #161b22;
    }

    /* 自定义滚动条样式（暗色主题） */
    .terminal-content .xterm-viewport::-webkit-scrollbar {
      width: 10px;
    }

    .terminal-content .xterm-viewport::-webkit-scrollbar-track {
      background: #161b22;
      border-radius: 5px;
    }

    .terminal-content .xterm-viewport::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 5px;
    }

    .terminal-content .xterm-viewport::-webkit-scrollbar-thumb:hover {
      background: #484f58;
    }

    /* Firefox 滚动条样式 */
    .terminal-content .xterm-viewport {
      scrollbar-width: thin;
      scrollbar-color: #30363d #161b22;
    }

    /* Empty State */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #8b949e;
      gap: 16px;
    }

    #empty-state svg {
      width: 64px;
      height: 64px;
      opacity: 0.5;
    }

    #empty-state p {
      font-size: 14px;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .loading::after {
      content: '';
      width: 20px;
      height: 20px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: #21262d;
      border: 1px solid #30363d;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      animation: slideIn 0.3s ease;
    }

    .toast.error {
      border-color: #f85149;
      color: #f85149;
    }

    .toast.success {
      border-color: #3fb950;
      color: #3fb950;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Responsive */
    @media (max-width: 600px) {
      #header {
        padding: 10px;
      }

      #header h1 {
        font-size: 16px;
      }

      .header-actions {
        width: 100%;
        margin-left: 0;
      }

      .btn {
        flex: 1;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div id="header">
    <h1>Multi Terminal</h1>
    <div id="status">
      <span class="status-dot"></span>
      <span id="status-text">已连接</span>
    </div>
    <span id="terminal-count">0 个终端</span>
    <span id="user-info" style="font-size:13px;color:#8b949e;"></span>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="createTerminal()">
        <span>+</span> 新建终端
      </button>
      <button class="btn btn-secondary" onclick="killAllTerminals()">
        关闭全部
      </button>
      <button class="btn btn-secondary" onclick="logout()" id="logout-btn">
        登出
      </button>
    </div>
  </div>

  <!-- Tabs -->
  <div id="tabs"></div>

  <!-- Terminals -->
  <div id="terminals">
    <div id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 17l6-6-6-6M12 19h8"/>
      </svg>
      <p>点击「新建终端」开始</p>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="/libs/xterm/lib/xterm.js"></script>
  <script src="/libs/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
  <script src="/libs/xterm-addon-web-links/lib/xterm-addon-web-links.js"></script>
  <script src="/libs/socket.io-client/dist/socket.io.min.js"></script>
  <script>
    // 认证检查
    const TOKEN_KEY = 'mt_token';
    const USER_KEY = 'mt_user';
    const token = localStorage.getItem(TOKEN_KEY);

    if (!token) {
      window.location.href = '/login.html';
    } else {
      // 验证 Token 有效性
      fetch(window.location.origin + '/api/verify', {
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(res => {
        if (!res.ok) {
          localStorage.removeItem(TOKEN_KEY);
          localStorage.removeItem(USER_KEY);
          window.location.href = '/login.html';
        }
      }).catch(() => {
        // 网络错误时允许继续
      });
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
