<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>退出并保留 - Multi Terminal</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px 32px;
      text-align: center;
      max-width: 400px;
    }

    .card svg {
      width: 64px;
      height: 64px;
      color: #3fb950;
      margin-bottom: 20px;
    }

    .card h1 {
      font-size: 20px;
      font-weight: 600;
      color: #c9d1d9;
      margin-bottom: 12px;
    }

    .card p {
      color: #8b949e;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .terminal-info {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .terminal-info p {
      font-size: 13px;
      margin: 0;
    }

    .terminal-info strong {
      color: #58a6ff;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: #238636;
      color: #fff;
      border: none;
    }

    .btn-primary:hover {
      background: #2ea043;
    }

    .btn-secondary {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
    }

    .btn-secondary:hover {
      background: #30363d;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      font-size: 13px;
      color: #3fb950;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="card">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>

    <h1>已退出并保留终端</h1>

    <p>您的终端进程仍在后台运行<br/>随时可以重新连接恢复使用</p>

    <div class="terminal-info">
      <p><strong>提示：</strong> 点击下方按钮重新连接到您的终端会话</p>
    </div>

    <div class="btn-group">
      <a href="/" class="btn btn-primary">重新连接</a>
      <a href="/login.html" class="btn btn-secondary">返回登录</a>
    </div>

    <div class="status">
      <span class="status-dot"></span>
      <span>终端会话保持中</span>
    </div>
  </div>

  <script>
    // 自动检查并显示恢复的终端数量
    const token = localStorage.getItem('mt_token');
    if (token) {
      fetch(window.location.origin + '/api/stats', {
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(res => res.json())
        .then(data => {
          if (data.total > 0) {
            const infoEl = document.querySelector('.terminal-info p');
            infoEl.innerHTML = `当前有 <strong>${data.total}</strong> 个终端正在运行`;
          }
        })
        .catch(() => {});
    }
  </script>
</body>
</html>
